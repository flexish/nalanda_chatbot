services:
  app:
    build: .
    image: nalanda-rag
    container_name: nalanda-rag
    ports:
      - "8000:7860"
    environment:
      PORT: "7860"
    env_file:
      - .env
    volumes:
      # Persist vector store and SQLite DB across container restarts
      - ./vectorstore:/app/vectorstore
      - ./vectorstore_test:/app/vectorstore_test
      - ./data:/app/data
      - ./web/nalanda_users.db:/app/web/nalanda_users.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
